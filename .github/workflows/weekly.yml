name: Weekly Pipeline

on:
  workflow_dispatch:
  schedule:
    #- cron: '0 18 * * 0'   # 매주 일요일 18:00 UTC = 한국 월요일 새벽 3:00
    - cron: '0 3 * * 4'    # [검증용] 매주 목요일 03:00 UTC = 한국 목요일 12:00

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 파이프라인 실행
        run: python run_weekly.py

      - name: 결과 자동 commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data_ghactions/
          if git diff --staged --quiet; then
            echo "커밋할 변경사항 없음"
          else
            git commit -m "chore: 주간 데이터 갱신 ($(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M'))"
            git push
          fi
